version: '3.8'

services:
  backend:
    build: ./backend
    container_name: praxis_backend
    restart: always
    ports:
      - "8087:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - PASSWORD_PEPPER=${PASSWORD_PEPPER}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # Conecta ao PostgreSQL existente na sua máquina/VM
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-senha}
      - DB_PORT=${DB_PORT:-5432}
      # Informa ao backend para usar a pasta interna /app/docs_gerados
      - DOCS_BASE_DIR=/app/docs_gerados
    # Se o postgres estiver em uma rede docker customizada, configure a rede aqui
    volumes:
      # MAPEAMENTO DA PASTA FÍSICA NO WINDOWS/LINUX PARA O DOCKER
      - /home/nelson/doc_gerados:/app/docs_gerados

  frontend:
    build: ./frontend
    container_name: praxis_frontend
    restart: always
    ports:
      # O Nginx interno escuta na porta 80, expomos o frontend na porta 5173 (ou outra que você preferir)
      - "5173:80"
    depends_on:
      - backend
