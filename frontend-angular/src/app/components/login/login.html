<div class="login-screen" style="position: relative; background: radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.05) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(197, 168, 128, 0.05) 0%, transparent 40%), var(--bg-primary); overflow: hidden; display: flex; align-items: center; justify-content: center; width: 100%; min-height: 100vh;">
  
  <!-- Glowing background blobs -->
  <div style="position: absolute; top: -10%; left: -10%; width: 400px; height: 400px; border-radius: 50%; background: var(--accent-gold); opacity: 0.04; filter: blur(80px); pointer-events: none;"></div>
  <div style="position: absolute; bottom: -10%; right: -10%; width: 450px; height: 450px; border-radius: 50%; background: #10B981; opacity: 0.03; filter: blur(90px); pointer-events: none;"></div>

  <button 
    (click)="authService.toggleTheme()" 
    class="btn btn-secondary" 
    style="position: absolute; top: 20px; right: 20px; margin: 0; padding: 8px 14px; font-size: 12px; z-index: 10; border-radius: 20px; backdrop-filter: blur(10px); background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);"
  >
    {{ authService.theme() === 'dark' ? '☀️ Modo Claro' : '🌙 Modo Escuro' }}
  </button>

  <div class="login-card-container" style="max-width: 460px; width: 100%; position: relative; z-index: 2; padding: 10px;">
    <!-- Glassmorphic Card -->
    <div style="background: rgba(18, 20, 23, 0.65); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 40px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);">
      
      <!-- Brand Logo Header -->
      <div style="display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 35px; gap: 12px;">
        <div style="width: 54px; height: 54px; border-radius: 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 12px rgba(255,255,255,0.02); filter: drop-shadow(0 0 10px var(--accent-glow));">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 28px; height: 28px; color: var(--accent-gold);">
            <path d="M12 3v17M12 5l-8 3M12 5l8 3M4 8v4c0 2 2 4 4 4s4-2 4-4V8M12 8v4c0 2 2 4 4 4s4-2 4-4V8M7 20h10" />
          </svg>
        </div>
        <div>
          <h1 class="font-cinzel" style="font-size: 26px; letter-spacing: 4px; font-weight: 800; background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">PRAXIS</h1>
          <p style="font-size: 11px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1.5px; margin-top: 4px; font-weight: 500;">Automação de Minutas & Fila RAG</p>
        </div>
        <div style="height: 1px; width: 40px; background: linear-gradient(90deg, transparent, var(--accent-gold), transparent); margin-top: 8px;"></div>
      </div>

      <!-- Login Form -->
      <form (submit)="handleSubmit($event)" style="display: flex; flex-direction: column; gap: 20px;">
        @if (error()) {
          <div class="alert alert-error" style="background: rgba(239, 68, 68, 0.1); border-color: #EF4444; color: #EF4444; border-radius: 8px; margin-bottom: 5px; padding: 12px 16px; font-size: 13px;">{{ error() }}</div>
        }

        <div class="form-group">
          <label class="form-label" for="email">E-mail Corporativo</label>
          <input
            id="email"
            type="email"
            class="form-input"
            placeholder="exemplo@escritorio.com"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            [disabled]="loading()"
            style="border-radius: 8px; background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.1);"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <div style="position: relative; width: 100%;">
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              class="form-input"
              placeholder="••••••••"
              [ngModel]="senha()"
              (ngModelChange)="senha.set($event)"
              name="password"
              [disabled]="loading()"
              style="padding-right: 46px; border-radius: 8px; background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.1);"
            />
            <button
              type="button"
              (click)="showPassword.set(!showPassword())"
              style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary, #888); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; margin: 0; min-width: auto; z-index: 5; opacity: 0.7;"
              [title]="showPassword() ? 'Ocultar Senha' : 'Mostrar Senha'"
            >
              @if (showPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 18px; height: 18px;">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 18px; height: 18px;">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              }
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px; border-radius: 8px; padding: 14px;" [disabled]="loading()">
          {{ loading() ? '🔐 AUTENTICANDO...' : 'ENTRAR NO SISTEMA' }}
        </button>
      </form>
      
      <!-- Footer details -->
      <div style="margin-top: 30px; text-align: center; font-size: 11px; color: var(--text-secondary); font-weight: 300;">
        Praxis Legal Analytics &copy; 2026. Todos os direitos reservados.
      </div>
    </div>
  </div>
</div>
